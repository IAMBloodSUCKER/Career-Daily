server:
  port: 8080

spring:
  application:
    name: career-daily-gateway
  cloud:
    gateway:
      routes:
        - id: auth
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
        - id: admin
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/admin/**
        - id: game
          uri: ${GAME_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/game/**
