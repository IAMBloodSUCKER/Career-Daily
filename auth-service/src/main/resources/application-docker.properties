spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/devsimulator}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:devsimulator}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:devsimulator}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_auth_history
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

app.admin.bootstrap-enabled=true
app.admin.username=admin
app.admin.password=admin
