server.port=8081
spring.application.name=career-daily-auth

spring.profiles.active=dev

app.jwt.secret=${APP_JWT_SECRET:career-daily-dev-jwt-secret-key-min-32-chars}
app.jwt.expiration-hours=72

app.game-service.base-url=${GAME_SERVICE_URL:http://localhost:8082}
app.game-service.internal-token=${INTERNAL_API_TOKEN:dev-internal-token}

app.admin.bootstrap-enabled=true
app.admin.username=admin
app.admin.password=admin
app.admin.email=admin@local.dev
app.admin.display-name=Admin

# Капча: internal (картинки / слайдер) | yandex | none
app.captcha.enabled=true
app.captcha.provider=internal
# Yandex SmartCaptcha (РФ): https://cloud.yandex.ru/services/smartcaptcha
# app.captcha.provider=yandex
# app.captcha.yandex.client-key=${SMARTCAPTCHA_CLIENT_KEY:}
# app.captcha.yandex.server-key=${SMARTCAPTCHA_SERVER_KEY:}

# Юридические реквизиты оператора (152-ФЗ) — заполните перед публичным запуском
app.legal.operator-name=${APP_LEGAL_OPERATOR_NAME:Оператор сервиса Java Dev Daily (физическое лицо)}
app.legal.operator-inn=${APP_LEGAL_OPERATOR_INN:}
app.legal.operator-ogrn=${APP_LEGAL_OPERATOR_OGRN:}
app.legal.operator-address=${APP_LEGAL_OPERATOR_ADDRESS:Российская Федерация}
app.legal.privacy-email=${APP_LEGAL_PRIVACY_EMAIL:privacy@example.com}
app.legal.support-email=${APP_LEGAL_SUPPORT_EMAIL:support@example.com}
app.legal.site-url=${APP_LEGAL_SITE_URL:http://localhost:3000}
app.legal.policy-version=${APP_LEGAL_POLICY_VERSION:2026-06-26}
app.legal.terms-version=${APP_LEGAL_TERMS_VERSION:2026-06-26}
