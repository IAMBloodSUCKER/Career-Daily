server.port=8081
spring.application.name=career-daily-auth

spring.profiles.active=dev

app.jwt.secret=${APP_JWT_SECRET:career-daily-dev-jwt-secret-key-min-32-chars}
app.jwt.expiration-hours=72

app.game-service.base-url=${GAME_SERVICE_URL:http://localhost:8082}
app.game-service.internal-token=${INTERNAL_API_TOKEN:dev-internal-token}

app.admin.bootstrap-enabled=true
app.admin.username=admin
app.admin.password=admin
app.admin.email=admin@local.dev
app.admin.display-name=Admin

# Капча при регистрации: internal (по умолчанию) | yandex | none
app.captcha.enabled=true
app.captcha.provider=internal
# Yandex SmartCaptcha (РФ): https://cloud.yandex.ru/services/smartcaptcha
# app.captcha.provider=yandex
# app.captcha.yandex.client-key=${SMARTCAPTCHA_CLIENT_KEY:}
# app.captcha.yandex.server-key=${SMARTCAPTCHA_SERVER_KEY:}

# SMS-подтверждение телефона +7 при регистрации
# provider: log (код в лог сервера, dev) | smsru (SMS.ru) | none
app.sms.enabled=true
app.sms.provider=log
# app.sms.provider=smsru
# app.sms.smsru.api-id=${SMSRU_API_ID:}
app.sms.code-length=6
app.sms.ttl-minutes=10
app.sms.resend-seconds=60
app.sms.message-template=Код Career Daily: {code}
