  <text x="460" y="448" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">PostgreSQL :5432</text>
  <text x="460" y="478" text-anchor="middle" font-size="11" fill="#64748b">one DB, separate Flyway tables</text>

  <line x1="144" y1="100" x2="198" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
