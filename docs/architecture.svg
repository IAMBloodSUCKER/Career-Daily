  <text x="495" y="148" text-anchor="middle" font-size="11" fill="#64748b">routes /api/*</text>

  <rect x="640" y="48" width="170" height="88" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
