  <line x1="350" y1="118" x2="408" y2="118" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="379" y="110" text-anchor="middle" font-size="10" fill="#64748b">/api/*</text>

  <path d="M580 100 L620 92" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M580 130 L620 200" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="725" y1="136" x2="725" y2="266" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="748" y="200" font-size="10" fill="#15803d">JPA</text>

  <line x1="725" y1="240" x2="725" y2="336" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <path d="M675 310 C 560 310, 520 400, 400 420" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
