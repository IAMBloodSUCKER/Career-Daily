  <text x="275" y="122" text-anchor="middle" font-size="12" fill="#1e40af">nginx</text>
  <text x="275" y="142" text-anchor="middle" font-size="11" fill="#334155">HTML / CSS / JS</text>

  <rect x="410" y="72" width="170" height="92" rx="10" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
