  </defs>

  <rect width="920" height="520" fill="#ffffff"/>
  <text x="460" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Career Daily � architecture</text>

  <rect x="24" y="72" width="120" height="56" rx="8" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="84" y="105" text-anchor="middle" font-size="14" font-weight="600">Browser</text>
  <rect x="24" y="136" width="120" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="4 3"/>
