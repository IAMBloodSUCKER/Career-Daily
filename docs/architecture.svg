  <path d="M675 360 C 580 360, 540 410, 420 435" fill="none" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <text x="500" y="388" font-size="11" font-weight="600" fill="#6d28d9">game-service writes game_saves</text>

  <path d="M725 136 L725 166" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-dashed)"/>
  <text x="760" y="158" font-size="10" fill="#64748b">internal API</text>

  <rect x="24" y="400" width="300" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="40" y="422" font-size="12" font-weight="700">Legend</text>
  <line x1="40" y1="442" x2="70" y2="442" stroke="#16a34a" stroke-width="2.5"/>
  <text x="78" y="446" font-size="11" fill="#334155">green: auth-service to users table</text>
  <line x1="40" y1="464" x2="70" y2="464" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="78" y="468" font-size="11" fill="#334155">purple: game-service to game_saves</text>
  <line x1="40" y1="486" x2="70" y2="486" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="78" y="490" font-size="11" fill="#334155">dashed: admin deletes save via internal API</text>
</svg>
