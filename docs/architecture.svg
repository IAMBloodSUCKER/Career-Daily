  <text x="725" y="96" text-anchor="middle" font-size="11" fill="#166534">/api/auth</text>
  <text x="725" y="112" text-anchor="middle" font-size="11" fill="#166534">/api/admin</text>

  <rect x="640" y="168" width="170" height="72" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="725" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">game-service :8082</text>
  <text x="725" y="218" text-anchor="middle" font-size="11" fill="#5b21b6">/api/game</text>

  <ellipse cx="725" cy="290" rx="52" ry="22" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <text x="725" y="295" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">users</text>

  <ellipse cx="725" cy="360" rx="58" ry="22" fill="#ddd6fe" stroke="#7c3aed" stroke-width="2"/>
