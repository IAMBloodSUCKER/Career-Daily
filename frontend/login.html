<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Java Dev Daily</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-body">

<div class="auth-card">
    <a href="/" class="auth-back">← На главную</a>
    <h1>Java Dev Daily</h1>
    <p class="auth-subtitle">Войдите, чтобы играть</p>

    <div class="auth-tabs">
        <button type="button" id="tab-login" class="auth-tab active">Вход</button>
        <button type="button" id="tab-register" class="auth-tab">Регистрация</button>
    </div>

    <form id="login-form" class="auth-form">
        <label class="field-label">Логин</label>
        <input id="login-input" type="text" class="text-input" autocomplete="username" required
               placeholder="admin">

        <label class="field-label">Пароль</label>
        <input id="login-password" type="password" class="text-input" autocomplete="current-password" required minlength="5">
        <p class="auth-hint auth-hint-muted">Забыли пароль? Восстановление недоступно — зарегистрируйте новый аккаунт.</p>

        <div id="auth-error" class="char-errors hidden"></div>
        <button type="submit" class="btn btn-primary auth-submit">Войти</button>
    </form>

    <form id="register-form" class="auth-form hidden">
        <p class="auth-hint">Регистрация по логину и паролю. Телефон и email не требуются. Сохраните пароль — восстановить его нельзя.</p>

        <div id="reg-error" class="char-errors hidden"></div>

        <label class="field-label">Логин <span class="field-required">*</span></label>
        <input id="reg-username" type="text" class="text-input" autocomplete="username" required minlength="3" maxlength="64"
               placeholder="alex_dev">

        <label class="field-label">Имя в игре <span class="field-required">*</span></label>
        <input id="reg-display" type="text" class="text-input" required minlength="2" maxlength="128"
               placeholder="Алексей">

        <label class="field-label">Пароль <span class="field-required">*</span></label>
        <input id="reg-password" type="password" class="text-input" autocomplete="new-password" required minlength="6">

        <div id="reg-captcha-wrap" class="auth-captcha hidden"></div>

        <label class="auth-consent">
            <input id="reg-terms" type="checkbox" required>
            <span>Я принимаю <a href="/legal.html#terms" target="_blank" rel="noopener">Пользовательское соглашение</a> и подтверждаю, что мне исполнилось 18 лет</span>
        </label>

        <label class="auth-consent">
            <input id="reg-consent" type="checkbox" required>
            <span>Я даю <a href="/legal.html#consent" target="_blank" rel="noopener">согласие на обработку персональных данных</a> и ознакомлен(а) с <a href="/legal.html#privacy" target="_blank" rel="noopener">Политикой конфиденциальности</a></span>
        </label>

        <button type="submit" class="btn btn-primary auth-submit">Зарегистрироваться</button>
    </form>

    <p class="trademark-notice trademark-notice-compact">
        Независимый симулятор ·
        <a href="/legal.html#privacy">Конфиденциальность</a> ·
        <a href="/legal.html#terms">Соглашение</a> ·
        <a href="/legal.html#trademarks">Legal</a>
    </p>
</div>

<script src="/js/config.js?v=1"></script>
<script src="/js/captcha-widgets.js?v=1"></script>
<script src="/js/auth.js?v=13"></script>
</body>
</html>
