# Локальная разработка без Docker — данные в папке data/
# AUTO_SERVER=TRUE — если БД уже открыта другим JVM (IntelliJ + mvn), подключение через TCP вместо ошибки 90020
spring.datasource.url=jdbc:h2:file:./data/devsimulator;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Админ создаётся при старте; dev-login — вход без пароля на странице логина
app.admin.bootstrap-enabled=true
app.admin.dev-login-enabled=true
app.admin.username=admin
app.admin.password=admin
app.admin.email=admin@local.dev
app.admin.display-name=Admin
