# PostgreSQL — Docker (порт 5433) или локальный PG после scripts/create-db.ps1
spring.datasource.url=jdbc:postgresql://localhost:5432/devsimulator
spring.datasource.username=devsimulator
spring.datasource.password=devsimulator
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
