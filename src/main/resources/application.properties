server.port=8080
spring.application.name=Java Dev Daily

# По умолчанию — встроенная H2 (файл ./data/devsimulator), Docker не нужен.
# PostgreSQL: запустите с -Dspring.profiles.active=postgres (после scripts/create-db.ps1)
spring.profiles.active=dev

# IT-новости на корпоративном портале (RSS, кэш на сервере)
portal.news.enabled=true
portal.news.refresh-minutes=45
portal.news.max-items=12
portal.news.fetch-timeout-seconds=8
