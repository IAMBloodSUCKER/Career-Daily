# PostgreSQL в Docker.
# Полный стек (docker compose up): приложение подключается к postgres:5432 через env.
# Только БД (docker compose up postgres) + приложение на хосте: localhost:5433.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/devsimulator}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:devsimulator}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:devsimulator}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.admin.bootstrap-enabled=true
app.admin.dev-login-enabled=true
app.admin.username=admin
app.admin.password=admin
app.admin.email=admin@local.dev
app.admin.display-name=Admin
