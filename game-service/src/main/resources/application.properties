server.port=8082
spring.application.name=career-daily-game

spring.profiles.active=dev

app.jwt.secret=${APP_JWT_SECRET:career-daily-dev-jwt-secret-key-min-32-chars}
app.internal.token=${INTERNAL_API_TOKEN:dev-internal-token}

portal.news.enabled=true
portal.news.refresh-minutes=45
portal.news.max-items=12
portal.news.fetch-timeout-seconds=8
